<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 2026 • Login</title>
    <link rel="stylesheet" href="src/css/login.css">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <!-- Font Awesome para ícones profissionais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <!-- Elementos decorativos de fundo (ondas orgânicas) -->
    <div class="background-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="logo-wrapper">
                <img id="logo" src="src/icons/icon-512x512.png" alt="Lista 2026 Logo">
                <div class="logo-glow"></div>
            </div>
            
            <div class="header-text">
                <h2 class="titulo">Bem-vindo de volta</h2>
                <p class="subtitulo">Organize suas compras de forma inteligente</p>
            </div>

            <form class="login-form" onsubmit="event.preventDefault(); login();">
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" class="modern-input" placeholder=" " required>
                        <label for="email" class="input-label">E-mail</label>
                        <div class="input-border"></div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="senha" class="modern-input" placeholder=" " required>
                        <label for="senha" class="input-label">Senha</label>
                        <div class="input-border"></div>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="lembrar" checked>
                        <span class="checkmark"></span>
                        <span class="checkbox-text">Lembrar de mim</span>
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <div class="botoes">
                    <button type="submit" class="btn-primary">
                        <span>Entrar</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    
                    <div class="divider">
                        <span>ou</span>
                    </div>
                    
                    <button type="button" onclick="cadastro()" class="btn-secondary">
                        <i class="fas fa-user-plus"></i>
                        <span>Criar nova conta</span>
                    </button>
                </div>
            </form>

            <div class="footer-text">
                <p>Ao entrar, você concorda com nossos <a href="#">Termos</a> e <a href="#">Privacidade</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>

    <script>
        // Toggle de visibilidade da senha
        function togglePassword() {
            const senhaInput = document.getElementById('senha');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                senhaInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('✅ ServiceWorker registrado:', registration.scope);
                    })
                    .catch(error => {
                        console.log('❌ Falha no ServiceWorker:', error);
                    });
            });
        }

        // Animação suave dos inputs
        document.querySelectorAll('.modern-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
</body>

</html>
